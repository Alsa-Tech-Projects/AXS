name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew
      continue-on-error: true # Just in case gradlew is not present in the root folder

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK (Unsigned)
      run: ./gradlew assembleRelease

    - name: Upload Debug APK Artifact
      uses: actions/artifacts/upload@v4
      with:
        name: axs-controller-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK Artifact
      uses: actions/artifacts/upload@v4
      with:
        name: axs-controller-release-unsigned-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
